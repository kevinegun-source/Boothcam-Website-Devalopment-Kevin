<body>
     <header>
      <h1>Car dealer Payment</h1>
      <nav>
        <a href="dashboard.html">Home</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart</a>
      </nav>

    <main>
      <!-- Order Summary -->
      <div class="order-summary" id="order-summary">
       <h3>Order Details</h3>
       <!-- Product items will be dynamically inserted here -->
        <p id="total-price"><stromg>Totall: $0</stromg></p>
      </div>
      <!-- Payment form -->
       <form class="payment-form">
        <h3>Payment Information</h3>


        <label for="card-name">Card Number</label>
        <input type="number" id="card-number" placeholder="1234 5678 3456" required>


        <label for="cvv">CVV</label>
        <input type="number" id="cvv" placeholder="123" required>


        <button type="submit" class="pay-button">Pay Now</button>
       </form>
    </main>
