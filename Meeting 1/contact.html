<head>

    <link rel="stylesheet" href="style.css" type="text/css" />
</head>
<body>
    <header>
      <h1>Car dealer Contact</h1>
      <nav>
        <a href="dashboard.html">Home</a>
        <a href="contact.html">Contact</a>
        <a href="about.html">About</a>
        <a href="cart.html">Cart</a>
      </nav>
    </header>
    <main>
      <form action="https://formsubmit.co/daffaghosaam69@gmail.com" autocomplete="off" method="POST" class="contact-container">
        <h2>Ask Us Question!</h2>
        <div class="contact-info">
          <label for="username">Fullname/Nickname:</label>
          <input type="text" id="username" name="fullname" placeholder="JohnDoe">

          <label for="email">Email:</label>
          <input type="email" id="emai" name="email" placeholder="johndoe@example.com">

          <label for="phone">Phone:</label>
          <input type="number" id="phone" name="phone" placeholder="+123456789">
          <button class="save-button" type="submit">Save Changes</button>
        </div>
      </form>
    </main>
     <footer>
        <p>&copy; 2023 Car dealer. All Rights Reserved.</p>
    </footer>, initial-scale=1.0">
